<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAROK MVP — kalkulačka nárokov</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="hero">
      <h1>NAROK</h1>
      <p>Orientačná kalkulačka nároku pre Slovensko: PN, OČR, podpora v nezamestnanosti.</p>
    </header>

    <section class="card form-card">
      <h2>Tvoje údaje (MVP v1.1)</h2>
      <form id="eligibilityForm">
        <div class="grid">
          <label>
            Status
            <select id="status" required>
              <option value="szco">SZČO (živnostník)</option>
              <option value="employee">Zamestnanec</option>
            </select>
          </label>

          <label>
            Aktívne nemocenské poistenie
            <select id="sicknessInsured" required>
              <option value="yes">Áno</option>
              <option value="no">Nie</option>
            </select>
          </label>

          <label>
            Dni nemocenského poistenia za posledné 2 roky
            <input id="sicknessDays2y" type="number" min="0" value="730" required />
          </label>

          <label>
            Máš nedoplatky na sociálnom poistení?
            <select id="hasSocialDebt" required>
              <option value="no">Nie</option>
              <option value="yes">Áno / neviem</option>
            </select>
          </label>

          <label>
            Priemerný mesačný vymeriavací základ (EUR)
            <input id="monthlyBase" type="number" min="0" step="0.01" value="1300" required />
          </label>

          <label>
            Koľko dní PN chceš rátať
            <input id="pnDays" type="number" min="1" max="365" value="30" required />
          </label>

          <label>
            Koľko dní OČR chceš rátať
            <input id="ocrDays" type="number" min="1" max="365" value="14" required />
          </label>

          <label>
            Mal(a) si poistenie v nezamestnanosti?
            <select id="hasUnemploymentInsurance" required>
              <option value="no">Nie</option>
              <option value="yes">Áno</option>
            </select>
          </label>

          <label>
            Dni poistenia v nezamestnanosti za posledné 4 roky
            <input id="unemploymentDays4y" type="number" min="0" value="0" required />
          </label>

          <label>
            Si evidovaný(á) na úrade práce?
            <select id="registeredJobseeker" required>
              <option value="no">Nie</option>
              <option value="yes">Áno</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button type="button" id="prefillSzcoProfile" class="secondary">Predvyplniť: 5 rokov SZČO (test)</button>
          <button type="submit">Vypočítať nároky</button>
        </div>
      </form>
    </section>

    <section id="results" class="results"></section>

    <section class="note">
      <strong>Dôležité:</strong> Toto je orientačný MVP výpočet. Finálny nárok vždy potvrdzuje Sociálna poisťovňa / ÚPSVaR.
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
